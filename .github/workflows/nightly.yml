name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC every night
  workflow_dispatch:      # allow manual trigger from GitHub UI

permissions:
  contents: write         # needed to create/update releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-

      - name: Build release
        run: cargo build --release

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes 2>$null || true
          git push origin :refs/tags/nightly 2>$null || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly `
            --title "Nightly Build" `
            --notes "Automated nightly build from ``${{ github.sha }}`` on $(Get-Date -Format 'yyyy-MM-dd')." `
            --prerelease `
            target/release/cauldron.exe `
            target/release/cauldron.ps1
